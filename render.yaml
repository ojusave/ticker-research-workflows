services:
  - type: web
    name: ticker-research
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"
      - key: WORKFLOW_SERVICE_SLUG
        sync: false